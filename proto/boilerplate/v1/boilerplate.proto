syntax = "proto3";

package boilerplate.v1;

option go_package = "github.com/IltonSeixas/go-enterprise-boilerplate/internal/interface/grpc/proto;proto";

// Mirrors the REST authentication endpoints under /api/v1/auth.
service AuthService {
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (AuthResponse);
}

// Mirrors the REST user endpoints under /api/v1/users.
// Every RPC requires an `authorization: Bearer <access_token>` request metadata entry.
service UserService {
  rpc GetMe(GetMeRequest) returns (UserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UserResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ChangeRole(ChangeRoleRequest) returns (UserResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  UserSummary user = 3;
}

message UserSummary {
  string id = 1;
  string email = 2;
  string name = 3;
  string role = 4;
}

message GetMeRequest {}

message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PaginationMetadata {
  int32 page = 1;
  int32 page_size = 2;
  int64 total_items = 3;
  int32 total_pages = 4;
}

message ListUsersResponse {
  repeated UserResponse items = 1;
  PaginationMetadata pagination = 2;
}

message UpdateProfileRequest {
  string name = 1;
}

message ChangePasswordRequest {
  string current_password = 1;
  string new_password = 2;
}

message ChangePasswordResponse {}

message ChangeRoleRequest {
  string user_id = 1;
  string role = 2;
}

message UserResponse {
  string id = 1;
  string email = 2;
  string name = 3;
  string role = 4;
  bool is_active = 5;
  string created_at = 6;
  string updated_at = 7;
}
